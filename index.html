let currentCategory='asen', index=0, quizActive=false;

function loadCategory(cat){
    quizActive=false; 
    currentCategory=cat; 
    index=0; 
    document.getElementById("progress-cont").style.display = "block";
    showCard();
}

function showCard(){
    let item=data[currentCategory][index];
    document.getElementById("card-category").innerText=currentCategory.toUpperCase();
    document.getElementById("card-king").innerText=item.king||"";
    document.getElementById("card-title").innerText=item.title;
    document.getElementById("card-content").innerHTML=item.text;
    document.getElementById("card-counter").innerText=(index+1)+" von "+data[currentCategory].length;
    let percentage = ((index + 1) / data[currentCategory].length) * 100;
    document.getElementById("progress-bar").style.width = percentage + "%";
}

function nextCard(){
    if(quizActive) return; 
    index++; 
    if(index>=data[currentCategory].length) index=0; 
    showCard();
}

function prevCard(){
    if(quizActive) return; 
    index--; 
    if(index<0) index=data[currentCategory].length-1; 
    showCard();
}

function goStart(){
    quizActive=false;
    document.getElementById("card-category").innerText="MENÜ";
    document.getElementById("card-king").innerText="";
    document.getElementById("card-title").innerText="Kategorie wählen";
    document.getElementById("card-content").innerText="Wähle eine Rubrik oben oder starte das Quiz.";
    document.getElementById("card-counter").innerText="Start";
    document.getElementById("progress-bar").style.width = "0%";
}

function speak(){
    let text=document.getElementById("card-title").innerText+". "+document.getElementById("card-content").innerText;
    let speech=new SpeechSynthesisUtterance(text);
    speech.lang="de-DE";
    window.speechSynthesis.speak(speech);
}

let qIndex=0, correct=0;
function startQuiz(){
    quizActive=true; 
    qIndex=0; 
    correct=0; 
    document.getElementById("progress-cont").style.display="none"; 
    showQuiz();
}

function showQuiz(){
    let q=quizData[qIndex];
    document.getElementById("card-category").innerText="QUIZ";
    document.getElementById("card-king").innerText="";
    document.getElementById("card-title").innerText=q.q;
    let html="";
    for(let i=0;i<q.a.length;i++) {
        html+="<button class='button quiz-option' style='width:100%;' onclick='answer("+i+", event)'>"+q.a[i]+"</button>";
    }
    document.getElementById("card-content").innerHTML=html;
    document.getElementById("card-counter").innerText=(qIndex+1)+" von "+quizData.length;
}

function answer(i, e){
    e.stopPropagation();
    let q = quizData[qIndex];
    let card = document.getElementById("card");
    if(i === q.c) {
        correct++; 
        card.classList.add("correct-flash");
    } else {
        card.classList.add("wrong-flash");
    }
    setTimeout(() => {
        card.classList.remove("correct-flash", "wrong-flash");
        qIndex++;
        if(qIndex >= quizData.length){
            document.getElementById("card-title").innerText = "Ergebnis";
            document.getElementById("card-content").innerHTML = "Du hast " + correct + " von " + quizData.length + " Fragen richtig beantwortet.<br><br>Gute Arbeit, Kenner der Asen!";
            quizActive = false;
        } else {
            showQuiz();
        }
    }, 600);
}
